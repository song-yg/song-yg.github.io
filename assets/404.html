layout: default
permalink: /404.html

<div style="
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: 60vh;
  padding: 3rem 1.5rem;
  position: relative;
  overflow: hidden;
  background-color: #1b1b1e;
  color: #ffffff;
">

  <div style="
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: #3D60C9;
    opacity: 0.25;
    filter: blur(70px);
    pointer-events: none;
    z-index: 0;
  "></div>

  <div style="position: relative; z-index: 1;">
    <p style="
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      margin: 0 0 1rem;
      color: #3D60C9;
      letter-spacing: -2px;
    ">404</p>

    <h2 style="font-size: 1.4rem; margin: 0 0 0.75rem; color: #ffffff;">
      음, 여기는 아무것도 없습니다.
    </h2>

    <p style="
      font-size: 1rem;
      color: #b8b8b8;
      max-width: 420px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    ">
      찾으시는 페이지가 없어졌거나, 주소가 잘못 입력된 것 같아요.<br>
      제가 뭔가 덜 만들었을수도 있죠. 홈으로 돌아가시면 다른 글들은 잘 보일거에요!
    </p>

    <a href="{{ '/' | relative_url }}" style="
      display: inline-block;
      padding: 0.6rem 1.5rem;
      border: 1.5px solid #3D60C9;
      border-radius: 999px;
      color: #3D60C9;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.3s ease, color 0.3s ease;
    "
    onmouseover="this.style.backgroundColor='#3D60C9'; this.style.color='#fff';"
    onmouseout="this.style.backgroundColor='transparent'; this.style.color='#3D60C9';"
    >
      홈으로 돌아가기
    </a>
  </div>

</div>
